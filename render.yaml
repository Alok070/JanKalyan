services:
  - type: web
    name: jankalyan-chatbot
    env: docker
    plan: free
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SARVAM_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: schemes.db
      - key: LOG_LEVEL
        value: INFO
