<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanKalyan — Welfare Scheme Assistant</title>
    <meta name="description" content="AI-powered multilingual chatbot to discover Indian government welfare schemes you're eligible for.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&family=Noto+Sans+Tamil:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="chat-header" id="chat-header">
            <div class="header-left">
                <div class="avatar">
                    <span class="avatar-icon">🏛️</span>
                    <span class="status-dot"></span>
                </div>
                <div class="header-info">
                    <h1>JanKalyan <span class="header-hindi">जनकल्याण</span></h1>
                    <p class="header-subtitle">Welfare Scheme Assistant</p>
                </div>
            </div>
            <div class="header-actions">
                <select id="lang-select" class="lang-select" title="Language preference">
                    <option value="en">English</option>
                    <option value="hi">हिन्दी</option>
                    <option value="ta">தமிழ்</option>
                </select>
                <button class="btn-icon" id="btn-reset" title="Start over">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
                </button>
            </div>
        </header>

        <!-- Chat messages area -->
        <main class="chat-messages" id="chat-messages">
            <!-- Welcome card -->
            <div class="welcome-card" id="welcome-card">
                <div class="welcome-icon">🇮🇳</div>
                <h2>Find Your Government Schemes</h2>
                <p>Answer a few simple questions to discover welfare schemes you may be eligible for.</p>
                <div class="welcome-langs">
                    <span class="lang-badge" data-lang="en" id="lang-en">English</span>
                    <span class="lang-badge" data-lang="hi" id="lang-hi">हिन्दी</span>
                    <span class="lang-badge" data-lang="ta" id="lang-ta">தமிழ்</span>
                </div>
                <div class="welcome-schemes">
                    <span class="scheme-tag">PM-KISAN</span>
                    <span class="scheme-tag">Ayushman Bharat</span>
                    <span class="scheme-tag">PMAY</span>
                    <span class="scheme-tag">Ujjwala</span>
                    <span class="scheme-tag">MGNREGA</span>
                    <span class="scheme-tag">+5 more</span>
                </div>
            </div>
        </main>

        <!-- Input area -->
        <footer class="chat-input-area" id="chat-input-area">
            <div class="input-container">
                <input
                    type="text"
                    id="message-input"
                    class="message-input"
                    placeholder="Type your message..."
                    autocomplete="off"
                    maxlength="500"
                >
                <button class="send-btn" id="send-btn" title="Send message">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
            <div class="input-hint">
                <span id="input-hint-text">Say <strong>hi</strong>, <strong>नमस्ते</strong>, or <strong>வணக்கம்</strong> to start</span>
            </div>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
